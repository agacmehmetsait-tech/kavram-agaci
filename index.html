<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kavram Ağacı</title>

  <style>
    :root{
      --bg:#2f6b4f;   /* günlük tema */
      --bg2:#0f2018;
      --text:#ffffff;
      --muted: rgba(255,255,255,.75);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: linear-gradient(180deg, var(--bg), var(--bg2));
    }

    header{
      max-width: 980px;
      margin: 16px auto 8px;
      padding: 0 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    header h1{margin:0;font-size:22px}
    header p{margin:6px 0 0;color:var(--muted);font-size:13px;max-width:65ch;line-height:1.4}
    .pill{
      border:1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.18);
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color: var(--muted);
      backdrop-filter: blur(8px);
      white-space:nowrap;
    }

    main{
      max-width: 980px;
      margin: 0 auto 28px;
      padding: 0 14px;
      display:grid;
      gap:12px;
    }

    .panel{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      border-radius:18px;
      padding:14px 14px 16px;
      backdrop-filter: blur(10px);
    }

    /* Üst açıklama */
    #infoTitle{margin:0;font-size:18px}
    #infoMini{color:var(--muted);font-size:12px;margin-top:6px}
    #infoDesc{margin-top:10px;white-space:pre-wrap;line-height:1.65;font-size:14.5px}

    /* Ağaç sahnesi */
    .scene{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      border-radius:18px;
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .sceneTop{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }
    .sceneTop b{font-size:13px}
    .sceneTop span{font-size:12px;color:var(--muted)}

    .stageWrap{
      display:flex;
      justify-content:center;
      padding:14px 10px 18px;
    }

    /* Buradaki kutu: resim + kelimeler üst üste */
    .stage{
      position:relative;
      width:min(680px, 94vw);
      aspect-ratio: 3/4;
      border-radius:18px;
      overflow:hidden;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 20px 70px rgba(0,0,0,.35);
    }

    /* AĞAÇ RESMİ ORTADA */
    .treeImg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain; /* ağaç kadraja sığsın */
      z-index:1;
    }

    /* Tema rengi ağaca hafif yansısın */
    .overlay{
      position:absolute; inset:0;
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      opacity:.18;
      mix-blend-mode: multiply;
      z-index:2;
      pointer-events:none;
    }

    /* Yaprak/kelimeler mutlaka üstte kalsın */
    .leaf{
      position:absolute;
      transform: translate(-50%,-50%);
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.55);          /* daha görünür */
      border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.95);
      font-weight: 750;
      font-size: 12px;
      letter-spacing:.2px;
      backdrop-filter: blur(8px);
      cursor:pointer;
      user-select:none;
      z-index:4; /* EN ÜST */
      white-space:nowrap;
    }
    .leaf:hover{ transform: translate(-50%,-50%) scale(1.06); }

    .centerWord{
      position:absolute;
      left:50%;
      top:56%;
      transform: translate(-50%,-50%);
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.30);
      color:#fff;
      font-weight: 900;
      font-size: clamp(22px, 4vw, 44px);
      letter-spacing:.8px;
      cursor:pointer;
      z-index:5; /* EN ÜST */
      text-align:center;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
    }
    .centerWord:hover{ transform: translate(-50%,-50%) scale(1.03); }

    @media (max-width:520px){
      .leaf{font-size:11px;padding:6px 9px}
      .centerWord{top:58%}
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>🌳 Kavram Ağacı</h1>
      <p>Ağaç ortada görünür. 25 kavram yaprak gibi üstüne yerleşir. Ortadaki büyük kavrama tıklayınca üstte açıklama değişir.</p>
    </div>
    <div class="pill" id="datePill">📅</div>
  </header>

  <main>
    <section class="panel" id="infoCard">
      <h2 id="infoTitle">Günün Kavramı</h2>
      <div id="infoMini">Ortadaki kavrama tıkla.</div>
      <div id="infoDesc">Burada kavram açıklaması görünecek.</div>
    </section>

    <section class="scene">
      <div class="sceneTop">
        <b>🍃 25 Kavram</b>
        <span>Ortadaki kelime “bugünün kavramı”</span>
      </div>

      <div class="stageWrap">
        <div class="stage" id="stage">
          <img class="treeImg" src="./bg.png" alt="Ağaç" />
          <div class="overlay"></div>

          <div class="centerWord" id="centerWord">KURDÎ</div>
          <!-- yapraklar JS ile eklenecek -->
        </div>
      </div>
    </section>
  </main>

  <script>
    const CONCEPTS = [
      { word:"KURDÎ", desc:"Kurdî: Dil, kimlik ve hafıza." },
      { word:"Komel", desc:"Komel: Topluluk, dayanışma." },
      { word:"Rojava", desc:"Rojava: Batı; coğrafya + anlam." },
      { word:"Agahî", desc:"Agahî: Farkındalık, bilinç." },
      { word:"Azadî", desc:"Azadî: Özgürlük." },
      { word:"Hevî", desc:"Hevî: Umut." },
      { word:"Şoreş", desc:"Şoreş: Dönüşüm." },
      { word:"Peyam", desc:"Peyam: Mesaj." },
      { word:"Hestî", desc:"Hestî: His." },
      { word:"Nûçe", desc:"Nûçe: Haber." },
      { word:"Bajar", desc:"Bajar: Şehir." },
      { word:"Welat", desc:"Welat: Yurt." },
      { word:"Ziman", desc:"Ziman: Dil." },
      { word:"Hunêr", desc:"Hunêr: Sanat." },
      { word:"Stran", desc:"Stran: Şarkı." },
      { word:"Dîrok", desc:"Dîrok: Tarih." },
      { word:"Rê", desc:"Rê: Yol." },
      { word:"Raman", desc:"Raman: Düşünce." },
      { word:"Kom", desc:"Kom: Birlik." },
      { word:"Roj", desc:"Roj: Gün." },
      { word:"Nivîs", desc:"Nivîs: Yazı." },
      { word:"Xwendin", desc:"Xwendin: Okuma." },
      { word:"Rêxistin", desc:"Rêxistin: Örgütlenme." },
      { word:"Pevçûn", desc:"Pevçûn: Bağ kurma." },
      { word:"Pîroz", desc:"Pîroz: Kutlu." },
    ];

    // Yaprak konumları (posterine göre sonra ince ayar yaparız)
    const POS = [
      [30,16],[50,14],[70,16],
      [22,24],[40,24],[60,24],[78,24],
      [18,34],[33,34],[50,34],[67,34],[82,34],
      [22,44],[38,44],[62,44],[78,44],
      [26,54],[42,54],[58,54],[74,54],
      [30,64],[50,64],[70,64],
      [40,74],[60,74]
    ];

    const THEMES = [
      { bg:"#2f6b4f", bg2:"#0f2018" },
      { bg:"#6a2f66", bg2:"#1c0f1c" },
      { bg:"#2f4f6b", bg2:"#0f1b25" },
      { bg:"#7c5060", bg2:"#241419" },
      { bg:"#6b5a2f", bg2:"#1f1a0e" },
      { bg:"#2f6b6b", bg2:"#0e1f1f" },
    ];

    const $ = (id)=>document.getElementById(id);
    const pad2 = (n)=>String(n).padStart(2,"0");

    function dailyIndex(mod){
      const d = new Date();
      const key = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
      let h = 0;
      for(let i=0;i<key.length;i++) h = (h*31 + key.charCodeAt(i)) >>> 0;
      return h % mod;
    }

    function applyTheme(){
      const t = THEMES[dailyIndex(THEMES.length)];
      document.documentElement.style.setProperty("--bg", t.bg);
      document.documentElement.style.setProperty("--bg2", t.bg2);

      const d = new Date();
      $("datePill").textContent = `📅 ${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()}`;
    }

    function showConcept(word, first=false){
      const c = CONCEPTS.find(x=>x.word===word) || CONCEPTS[0];
      $("infoTitle").textContent = c.word;
      $("infoDesc").textContent = c.desc;
      $("infoMini").textContent = first ? "Bugünün kavramı" : "Seçildi";
      if(!first) $("infoCard").scrollIntoView({behavior:"smooth", block:"start"});
    }

    function renderLeaves(){
      const stage = $("stage");
      stage.querySelectorAll(".leaf").forEach(x=>x.remove());

      CONCEPTS.forEach((c, i)=>{
        const [x,y] = POS[i] || [50,50];
        const el = document.createElement("div");
        el.className = "leaf";
        el.textContent = c.word;
        el.style.left = x + "%";
        el.style.top  = y + "%";
        el.onclick = ()=> showConcept(c.word);
        stage.appendChild(el);
      });
    }

    function setDailyCenter(){
      const idx = dailyIndex(CONCEPTS.length);
      $("centerWord").textContent = CONCEPTS[idx].word;
      showConcept(CONCEPTS[idx].word, true);
      $("centerWord").onclick = ()=> showConcept($("centerWord").textContent.trim());
    }

    applyTheme();
    renderLeaves();
    setDailyCenter();
  </script>
</body>
</html>
